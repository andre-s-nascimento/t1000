São 6 arquivos — aqui o resumo do que muda e o que é novo:

Arquivos novos (criar)
BloggerClient.java → client/ — faz a troca do refresh_token por access_token e cria o rascunho via API do Blogger.

TranscricaoCache.java → service/ — ConcurrentHashMap<Long, String> que guarda o texto refinado por chatId enquanto o usuário decide se publica.

Arquivos atualizados (substituir)
AudioPipelineService.java — mudança cirúrgica: o callback passa de Consumer<String> para BiConsumer<String, Boolean>, onde o segundo parâmetro sinaliza "é a última mensagem" (o texto refinado).

TelegramController.java — recebe BloggerClient e TranscricaoCache por injeção, adiciona enviarRespostaComBotoesBlogger() e trata os dois novos callbacks: blogger:publicar e blogger:cancelar.

application.properties — 4 novas variáveis: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN, BLOGGER_BLOG_ID.

