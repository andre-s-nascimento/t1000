AudioPipelineServiceTest — testa o fluxo do pipeline:

java
@ExtendWith(MockitoExtension.class)
class AudioPipelineServiceTest {

    @Mock AudioService audioService;
    @Mock GroqClient groqClient;
    @InjectMocks AudioPipelineService pipeline;

    @Test
    void processarFluxoAudio_quandoSucesso_chamaCallbackDuasVezes() throws Exception {
        File oga = mock(File.class);
        File wav = mock(File.class);

        when(audioService.converterParaWav(oga))
            .thenReturn(CompletableFuture.completedFuture(wav));
        when(groqClient.transcrever(wav)).thenReturn("texto bruto");
        when(groqClient.refinarTexto("texto bruto")).thenReturn("texto refinado");

        List<String> capturas = new ArrayList<>();
        pipeline.processarFluxoAudio(oga, capturas::add);

        // Aguarda o CompletableFuture
        Thread.sleep(200);

        assertThat(capturas).hasSize(2);
        assertThat(capturas.get(0)).contains("Bruto");
        assertThat(capturas.get(1)).contains("Refinado");
    }
}
