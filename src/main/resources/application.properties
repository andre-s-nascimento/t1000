Queria que houvesse um modo ou um modo ou de poder escolher uma transcrição específica de um áudio e publicar como rascunho de postagem num blog específico do blogger.com da Google. É possível? Não seriam pra todos os áudios. Só para alguns. O que você sugeriria?

18 de abr.
Sim, é totalmente possível! A API do Blogger da Google suporta criação de rascunhos programaticamente. Vou te explicar a abordagem que faz mais sentido pro seu contexto.

Como funcionaria no fluxo atual
O bot já transcreve e refina o texto. Você precisaria de um gatilho explícito para não publicar todo áudio — só os escolhidos. As opções mais naturais pro Telegram são:

Opção A — Comando especial O usuário manda o áudio com uma legenda específica, ex: /blog ou #post. O bot detecta a legenda e, após transcrever, pergunta se quer publicar como rascunho.

Opção B — Botão interativo (melhor UX) Após a transcrição, o bot envia os botões:

[✅ Publicar como Rascunho]  [❌ Só Transcrever]
O usuário escolhe. Se clicar em publicar, chama a API do Blogger.

Opção C — Comando de texto separado Depois de receber a transcrição, o usuário responde com /publicar e o bot posta o último texto transcrito daquele chat.

A Opção B é a mais elegante e consistente com o que você já fez na desambiguação de filmes.

O que precisaria implementar
1. Autenticação OAuth2 com Google É a parte mais trabalhosa. O Blogger exige OAuth2 com escopo https://www.googleapis.com/auth/blogger. Você precisaria:

Criar um projeto no Google Cloud Console
Registrar credenciais OAuth2
Implementar o fluxo de autorização uma única vez (o token de refresh fica salvo)
No Spring, isso seria feito via spring-security-oauth2-client ou simplesmente guardando o refresh_token em variável de ambiente após autorizar uma vez.

2. BloggerClient — novo client similar ao GroqClient:

java
@Component
public class BloggerClient {
    // POST https://www.googleapis.com/blogger/v3/blogs/{blogId}/posts/
    // com body: { title, content, status: "DRAFT" }
}
3. Novo estado no TelegramController Guardar temporariamente o texto transcrito por chatId (um Map<Long, String>) para quando o usuário clicar no botão de publicar.

