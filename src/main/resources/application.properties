MovieServiceTest — o mais urgente, pura lógica Java sem dependências externas:

java
@ExtendWith(MockitoExtension.class)
class MovieServiceTest {

    @Mock TmdbClient tmdbClient;
    @InjectMocks MovieService movieService;

    @Test
    void executarBuscaFormatada_quandoNaoEncontrar_retornaMensagemErro() {
        when(tmdbClient.pesquisarFilme("xyz")).thenReturn(
            new MovieSearchResponse(1, 0, 0, List.of()));

        var resultado = movieService.executarBuscaFormatada("xyz");

        assertThat(resultado.textoFormatado()).contains("não encontrado");
        assertThat(resultado.urlFoto()).isNull();
    }

    @Test
    void buscarPorId_quandoDetalhesRetornamNulo_retornaMensagemErro() {
        when(tmdbClient.buscarDetalhes(99L)).thenReturn(null);

        var resultado = movieService.buscarPorId(99L);

        assertThat(resultado.textoFormatado()).contains("não encontrados");
    }

    @Test
    void buscarPorId_quandoSucesso_retornaTextoFormatado() {
        var filme = new MovieRecord(1L, "Dune", "2021-09-15",
            "Sinopse aqui", 100.0, 8.2, "/poster.jpg", List.of("US"));
        when(tmdbClient.buscarDetalhes(1L)).thenReturn(filme);
        when(tmdbClient.buscarElenco(1L)).thenReturn(List.of(
            new CastRecord("Timothée Chalamet", "Paul")));
        when(tmdbClient.buscarOndeAssistir(1L)).thenReturn("Netflix");

        var resultado = movieService.buscarPorId(1L);

        assertThat(resultado.textoFormatado()).contains("DUNE");
        assertThat(resultado.textoFormatado()).contains("Netflix");
        assertThat(resultado.urlFoto()).contains("/poster.jpg");
    }
}
