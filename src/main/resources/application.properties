Implementar nesta ordem:

OAuth2 primeiro (gerar e salvar o refresh_token manualmente uma vez)
BloggerClient com método criarRascunho(titulo, conteudo)
Adicionar os botões após a transcrição refinada
Guardar o texto no Map<Long, String> ultimaTranscricao
