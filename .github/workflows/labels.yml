name: Labels

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write   # 🔥 ESSENCIAL

jobs:
  labels:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml